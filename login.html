<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <h1 class="logo"><i class="fa-solid fa-circle-user"></i> Create Account Here</h1>
                <button class="nav-toggle" aria-label="Toggle navigation">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <ul class="nav-menu">
                    <li><a href="index.html"><i class="fa-solid fa-house"></i> Home</a></li>
                    <li><a href="login.html" class="active"><i class="fa-solid fa-right-to-bracket"></i> Login</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="auth-container">
        <div class="auth-box">
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
                <button class="tab-btn" data-tab="signup"><i class="fa-solid fa-user-plus"></i> Sign Up</button>
            </div>

            <!-- Login Form -->
            <div id="loginForm" class="auth-form active">
                <h2><i class="fa-solid fa-key"></i> Login to Your Account</h2>
                <form id="loginFormElement">
                    <div class="form-group">
                        <label for="loginEmail">Email/Username</label>
                        <input type="text" id="loginEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <div class="form-group">
                        <label for="userType">Account Type</label>
                        <select id="userType" required>
                            <option value="">Select Account Type</option>
                            <option value="leader">Village Leader</option>
                            <option value="cell">Cell Leader</option>
                            <option value="sector">Sector Leader</option>
                            <option value="school">School Leader</option>
                            <option value="citizen">Citizen</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
            </div>

            <!-- Sign Up Form -->
            <div id="signupForm" class="auth-form">
                <h2><i class="fa-solid fa-user-plus"></i> Create New Account</h2>
                <form id="signupFormElement">
                    <div class="form-group">
                        <label for="signupName">Full Name</label>
                        <input type="text" id="signupName" required>
                    </div>
                    <div class="form-group">
                        <label for="signupEmail">Email</label>
                        <input type="email" id="signupEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="signupPhone">Phone Number</label>
                        <input type="tel" id="signupPhone" required>
                    </div>
                    <div class="form-group">
                        <label for="signupPassword">Password</label>
                        <input type="password" id="signupPassword" required>
                    </div>
                    <div class="form-group">
                        <label for="signupConfirmPassword">Confirm Password</label>
                        <input type="password" id="signupConfirmPassword" required>
                    </div>
                    <div class="form-group">
                        <label for="signupUserType">Account Type</label>
                        <select id="signupUserType" required>
                            <option value="">Select Account Type</option>
                            <option value="leader">Village Leader</option>
                            <option value="cell">Cell Leader</option>
                            <option value="sector">Sector Leader</option>
                            <option value="school">School Leader</option>
                            <option value="citizen">Citizen</option>
                        </select>
                    </div>
                    <div id="leaderFields" class="leader-specific-fields" style="display: none;">
                        <div class="form-group">
                            <label for="signupSector">Sector</label>
                            <input type="text" id="signupSector">
                        </div>
                        <div class="form-group">
                            <label for="signupCell">Cell</label>
                            <input type="text" id="signupCell">
                        </div>
                        <div class="form-group">
                            <label for="signupVillage">Village</label>
                            <input type="text" id="signupVillage">
                        </div>
                    </div>
                    <div id="cellFields" class="cell-specific-fields" style="display: none;">
                        <div class="form-group">
                            <label for="signupCellSector">Sector</label>
                            <input type="text" id="signupCellSector">
                        </div>
                        <div class="form-group">
                            <label for="signupCellCell">Cell</label>
                            <input type="text" id="signupCellCell">
                        </div>
                    </div>
                    <div id="sectorFields" class="sector-specific-fields" style="display: none;">
                        <div class="form-group">
                            <label for="signupSectorSector">Sector</label>
                            <input type="text" id="signupSectorSector">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Sign Up</button>
                </form>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/navbar.js"></script>
</body>
</html>
